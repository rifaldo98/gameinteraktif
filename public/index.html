<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Battle Arena</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --panel: #ffffff;
            --panel-border: #cbd5e1;
            --text: #0f172a;
            --muted: #475569;
            --accent: #0ea5e9;
            --accent-hover: #0284c7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: row;
            gap: 12px;
            padding: 12px;
        }

        #gameRoot {
            flex: 1;
            min-width: 0;
            border: 2px solid var(--panel-border);
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }

        #hud {
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 10px;
        }

        .panel h3 {
            margin: 0 0 8px 0;
            font-size: 15px;
        }

        .muted {
            color: var(--muted);
            font-size: 13px;
        }

        .row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .row > * {
            flex: 1;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--panel-border);
            font-size: 14px;
        }

        button {
            background: var(--accent);
            color: #ffffff;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-hover);
        }

        #queueList {
            margin: 8px 0 0 18px;
            padding: 0;
            max-height: 180px;
            overflow-y: auto;
            font-size: 14px;
        }

        #battleStatus {
            font-size: 14px;
            line-height: 1.45;
            white-space: pre-line;
        }

        @media (max-width: 980px) {
            #app {
                flex-direction: column;
            }

            #hud {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="gameRoot"></div>

        <aside id="hud">
            <section class="panel">
                <h3>Viewer Control</h3>
                <div class="muted">Tambah/keluarkan viewer untuk simulasi live.</div>
                <div class="row">
                    <input id="viewerName" type="text" placeholder="username viewer">
                </div>
                <div class="row">
                    <button id="joinBtn">Join</button>
                    <button id="leaveBtn">Leave</button>
                </div>
            </section>

            <section class="panel">
                <h3>Gift Control</h3>
                <div class="muted">Gift aktif hanya untuk player di arena atau queue.</div>
                <div class="row">
                    <input id="giftUser" type="text" placeholder="target username">
                </div>
                <div class="row">
                    <select id="giftType">
                        <option value="mawar">Mawar (+1 HP)</option>
                        <option value="donut">Donut (+30 HP)</option>
                        <option value="love">Love (+100 HP)</option>
                        <option value="corgi">Corgi (+300 HP)</option>
                        <option value="buket_bunga">Buket Bunga (Summon Lightning Mage, -30 HP)</option>
                        <option value="topi_kumis">Topi dan Kumis (Summon Fire Wizard, -100 HP)</option>
                        <option value="rosa">Rosa (Evolve Tengu)</option>
                    </select>
                    <button id="giftBtn">Send Gift</button>
                </div>
            </section>

            <section class="panel">
                <h3>Status Arena</h3>
                <div id="battleStatus">Menunggu data...</div>
                <div class="muted" id="queueMeta"></div>
                <ol id="queueList"></ol>
            </section>
        </aside>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const ui = {
            viewerName: document.getElementById("viewerName"),
            joinBtn: document.getElementById("joinBtn"),
            leaveBtn: document.getElementById("leaveBtn"),
            giftUser: document.getElementById("giftUser"),
            giftType: document.getElementById("giftType"),
            giftBtn: document.getElementById("giftBtn"),
            battleStatus: document.getElementById("battleStatus"),
            queueMeta: document.getElementById("queueMeta"),
            queueList: document.getElementById("queueList")
        };

        let sceneRef = null;
        let championView = null;
        let challengerView = null;
        let lastAttackId = 0;
        let lastGiftId = 0;
        let introInProgress = false;
        let summonInProgress = false;
        let introPairKey = "";
        let queuedAttackDuringIntro = null;
        let deathApplyDelayTimer = null;
        let pendingArenaState = null;
        let bufferedArenaState = null;
        const SPRITE_NATIVE_FACING_RIGHT = true;
        const SPRITE_FRAME_WIDTH = 128;
        const SPRITE_FRAME_HEIGHT = 128;
        const SPRITE_CROP_LEFT = 0;
        const SPRITE_CROP_RIGHT = 0;
        const SPRITE_CROP_TOP = 0;
        const SPRITE_CROP_BOTTOM = 0;
        const FORM_KNIGHT = "knight";
        const FORM_TENGU = "tengu";
        const FIGHT_READY_DELAY_MS = 1000;
        const DEATH_TRANSITION_DELAY_MS = 1000;
        const INTRO_WALK_MS = 430;
        const BACKGROUND_TEXTURE_KEY = "arenaBackground";
        const SSJ_AURA_TEXTURE_KEY = "ssjAuraSprite";
        const SSJ_AURA_ANIM_KEY = "ssjAuraLoop";
        const SSJ_AURA_FRAME_WIDTH = 204;
        const SSJ_AURA_FRAME_HEIGHT = 228;
        const SSJ_AURA_FRAME_COUNT = 4;
        const SSJ_AURA_WIN_STREAK = 3;
        const SSJ_AURA_KNIGHT_CHALLENGER_NUDGE_X = -16;
        const SSJ_AURA_SOUND_PATH = "sound/ssj%20aura.mp3";
        const SSJ_AURA_STANDBY_SOUND_PATH = "sound/ssj%20aura%20standby.mp3";
        const FIGHT_START_SOUND_PATH = "sound/fight.mp3";
        const YOU_LOSE_SOUND_PATH = "sound/you%20lose.mp3";
        const FIRE_ATTACK_SOUND_PATH = "sound/fireattack.mp3";
        const FIRE_BOOM_SOUND_PATH = "sound/fireboom.mp3";
        const LIGHTNING_ATTACK_SOUND_PATH = "sound/lightning%20attack.mp3";
        const LIGHTNING_BOOM_SOUND_PATH = "sound/lightning%20boom1.mp3";
        const SUMMON_RUN_SOUND_PATH = "sound/running.mp3";
        const SUMMON_JUMP_SOUND_PATH = "sound/jump.mp3";
        const OVERLAY_BACKSOUND_SOUND_PATH = "sound/backsoundoverlay.mp3";
        const KNIGHT_SLASH_SOUND_PATHS = [
            "sound/slashknight1.mp3",
            "sound/slashknight2.mp3"
        ];
        const TENGU_SLASH_SOUND_PATHS = [
            "sound/slashtengu1.mp3",
            "sound/slashtengu2.mp3"
        ];
        const SUMMON_OVERLAY_SOUND_PATHS = {
            fire_wizard: "sound/summonfirewizard.mp3",
            lightning_mage: "sound/summonmage.mp3",
            tengu_evolve: "sound/summontengu.mp3"
        };
        const CHAMPION_AURA_COLOR = 0x60a5fa;
        const CHALLENGER_AURA_COLOR = 0xf97316;
        const SUMMON_OVERLAY_TEXTURES = {
            fire_wizard: {
                key: "summonFireOverlay",
                path: "fire wizard overlay.png"
            },
            lightning_mage: {
                key: "summonLightOverlay",
                path: "lightning mage overlay.png"
            },
            tengu_evolve: {
                key: "summonTenguOverlay",
                path: "tengu overlay.png"
            }
        };
        const SUMMON_OVERLAY_FADE_MS = 180;
        const SUMMON_OVERLAY_HOLD_MS = 420;
        const SUMMON_OVERLAY_TOTAL_MS = (SUMMON_OVERLAY_FADE_MS * 2) + SUMMON_OVERLAY_HOLD_MS;
        const SUMMON_TEXTURE_KEYS = {
            fire_wizard: {
                run: "summonFireRun",
                jump: "summonFireJump",
                cast: "summonFireCast",
                hurt: "summonFireHurt"
            },
            lightning_mage: {
                run: "summonLightRun",
                jump: "summonLightJump",
                cast: "summonLightCast",
                hurt: "summonLightHurt"
            }
        };
        const SUMMON_DEFS = {
            fire_wizard: {
                label: "Fire Wizard",
                castType: "fire",
                run: { path: "Fire Wizard/Run.png", frameCount: 8, frameRate: 12 },
                jump: { path: "Fire Wizard/Jump.png", frameCount: 9, frameRate: 14 },
                cast: { path: "Fire Wizard/Flame_jet.png", frameCount: 14, frameRate: 15 },
                hurt: { path: "Fire Wizard/Hurt.png", frameCount: 3, frameRate: 10 },
                explosionPathPrefix: "Fire Wizard/Explosion/Explosion_",
                explosionSize: 360,
                castDurationMs: 920
            },
            lightning_mage: {
                label: "Lightning Mage",
                castType: "lightning",
                run: { path: "Lightning Mage/Run.png", frameCount: 8, frameRate: 12 },
                jump: { path: "Lightning Mage/Jump.png", frameCount: 8, frameRate: 14 },
                cast: { path: "Lightning Mage/Light_charge.png", frameCount: 13, frameRate: 15 },
                hurt: { path: "Lightning Mage/Hurt.png", frameCount: 3, frameRate: 10 },
                explosionPathPrefix: "Lightning Mage/Explosion/Explosion_",
                explosionSize: 400,
                castDurationMs: 900
            }
        };
        const SUMMON_EXPLOSION_FRAME_TOTAL = 10;
        const CHAMPION_SHEETS = {
            knight: {
                attack1: { textureKey: "championKnightAttack1", path: "Knight_1/Attack 1.png", frameCount: 5 },
                attack2: { textureKey: "championKnightAttack2", path: "Knight_1/Attack 2.png", frameCount: 4 },
                defend: { textureKey: "championKnightIdle", path: "Knight_1/Idle.png", frameCount: 4 },
                walk: { textureKey: "championKnightWalk", path: "Knight_1/Walk.png", frameCount: 8 },
                hurt: { textureKey: "championKnightHurt", path: "Knight_1/Hurt.png", frameCount: 2 },
                dead: { textureKey: "championKnightDead", path: "Knight_1/Dead.png", frameCount: 6 }
            },
            tengu: {
                attack1: { textureKey: "championTenguAttack1", path: "tengu1/Attack_1.png", frameCount: 3 },
                attack2: { textureKey: "championTenguAttack2", path: "tengu1/Attack_2.png", frameCount: 6 },
                defend: { textureKey: "championTenguIdle", path: "tengu1/Idle.png", frameCount: 6 },
                walk: { textureKey: "championTenguWalk", path: "tengu1/Walk.png", frameCount: 8 },
                hurt: { textureKey: "championTenguHurt", path: "tengu1/Hurt.png", frameCount: 3 },
                dead: { textureKey: "championTenguDead", path: "tengu1/Dead.png", frameCount: 6 }
            }
        };
        const CHALLENGER_SHEETS = {
            knight: {
                attack1: { textureKey: "challengerKnightAttack1", path: "Knight_2/Attack 1.png", frameCount: 5 },
                attack2: { textureKey: "challengerKnightAttack2", path: "Knight_2/Attack 2.png", frameCount: 4 },
                defend: { textureKey: "challengerKnightIdle", path: "Knight_2/Idle.png", frameCount: 4 },
                walk: { textureKey: "challengerKnightWalk", path: "Knight_2/Walk.png", frameCount: 8 },
                hurt: { textureKey: "challengerKnightHurt", path: "Knight_2/Hurt.png", frameCount: 2 },
                dead: { textureKey: "challengerKnightDead", path: "Knight_2/Dead.png", frameCount: 6 }
            },
            tengu: {
                attack1: { textureKey: "challengerTenguAttack1", path: "tengu2/Attack_1.png", frameCount: 6 },
                attack2: { textureKey: "challengerTenguAttack2", path: "tengu2/Attack_2.png", frameCount: 4 },
                defend: { textureKey: "challengerTenguIdle", path: "tengu2/Idle.png", frameCount: 6 },
                walk: { textureKey: "challengerTenguWalk", path: "tengu2/Walk.png", frameCount: 8 },
                hurt: { textureKey: "challengerTenguHurt", path: "tengu2/Hurt.png", frameCount: 3 },
                dead: { textureKey: "challengerTenguDead", path: "tengu2/Dead.png", frameCount: 6 }
            }
        };
        const battleFx = createBattleFx();

        const config = {
            type: Phaser.AUTO,
            parent: "gameRoot",
            width: 1280,
            height: 720,
            backgroundColor: "#f8fafc",
            pixelArt: true,
            antialias: false,
            scene: { preload, create, update }
        };

        new Phaser.Game(config);

        function preload() {
            this.load.image(BACKGROUND_TEXTURE_KEY, "background.png");
            this.load.spritesheet(SSJ_AURA_TEXTURE_KEY, "ssj sprite.png", {
                frameWidth: SSJ_AURA_FRAME_WIDTH,
                frameHeight: SSJ_AURA_FRAME_HEIGHT
            });
            preloadFighterSheets(this, CHAMPION_SHEETS);
            preloadFighterSheets(this, CHALLENGER_SHEETS);
            preloadSummonOverlays(this);
            preloadSummonSheets(this);
            preloadSummonExplosions(this);
        }

        function preloadFighterSheets(scene, sheets) {
            for (const formSheets of Object.values(sheets)) {
                for (const sheet of Object.values(formSheets)) {
                    scene.load.spritesheet(sheet.textureKey, sheet.path, {
                        frameWidth: SPRITE_FRAME_WIDTH,
                        frameHeight: SPRITE_FRAME_HEIGHT
                    });
                }
            }
        }

        function preloadSummonSheets(scene) {
            for (const [summonId, summonDef] of Object.entries(SUMMON_DEFS)) {
                const keys = SUMMON_TEXTURE_KEYS[summonId];
                if (!keys) {
                    continue;
                }

                scene.load.spritesheet(keys.run, summonDef.run.path, {
                    frameWidth: SPRITE_FRAME_WIDTH,
                    frameHeight: SPRITE_FRAME_HEIGHT
                });
                scene.load.spritesheet(keys.jump, summonDef.jump.path, {
                    frameWidth: SPRITE_FRAME_WIDTH,
                    frameHeight: SPRITE_FRAME_HEIGHT
                });
                scene.load.spritesheet(keys.cast, summonDef.cast.path, {
                    frameWidth: SPRITE_FRAME_WIDTH,
                    frameHeight: SPRITE_FRAME_HEIGHT
                });
                scene.load.spritesheet(keys.hurt, summonDef.hurt.path, {
                    frameWidth: SPRITE_FRAME_WIDTH,
                    frameHeight: SPRITE_FRAME_HEIGHT
                });
            }
        }

        function preloadSummonOverlays(scene) {
            for (const overlayDef of Object.values(SUMMON_OVERLAY_TEXTURES)) {
                if (!overlayDef || !overlayDef.key || !overlayDef.path) {
                    continue;
                }

                scene.load.image(overlayDef.key, overlayDef.path);
            }
        }

        function preloadSummonExplosions(scene) {
            for (const summonId of Object.keys(SUMMON_DEFS)) {
                for (let i = 1; i <= SUMMON_EXPLOSION_FRAME_TOTAL; i += 1) {
                    const key = getSummonExplosionFrameKey(summonId, i);
                    const path = SUMMON_DEFS[summonId].explosionPathPrefix + i + ".png";
                    scene.load.image(key, path);
                }
            }
        }

        function create() {
            sceneRef = this;
            createAnimations(this);
            this.cameras.main.roundPixels = true;
            this.input.once("pointerdown", () => {
                battleFx.unlockAudio();
            });

            addArenaBackground(this);
            this.add.rectangle(640, 360, 1280, 720, 0x0b1220, 0.26).setDepth(-29);
            this.add.rectangle(640, 674, 1280, 112, 0x0f172a, 0.44).setDepth(-28);

            championView = createFighterView(this, {
                x: 570,
                y: 666,
                faceRight: true,
                dashDirection: 1,
                textureKey: CHAMPION_SHEETS.knight.defend.textureKey,
                animPrefix: "champion",
                baseDepth: 10,
                scale: 2.4,
                spriteOffsetY: 0,
                auraColor: CHAMPION_AURA_COLOR
            });

            challengerView = createFighterView(this, {
                x: 710,
                y: 666,
                faceRight: false,
                dashDirection: -1,
                textureKey: CHALLENGER_SHEETS.knight.defend.textureKey,
                animPrefix: "challenger",
                baseDepth: 10,
                scale: 2.4,
                spriteOffsetY: 0,
                auraColor: CHALLENGER_AURA_COLOR
            });

            bindControls();

            socket.on("update", (arena) => {
                renderArena(arena);
            });
        }

        function update() {
            updateSsjAuraPlacement(championView);
            updateSsjAuraPlacement(challengerView);
        }

        function createAnimations(scene) {
            createAnimationSet(scene, "champion", CHAMPION_SHEETS);
            createAnimationSet(scene, "challenger", CHALLENGER_SHEETS);
            createSummonAnimations(scene);
            createSsjAuraAnimation(scene);
        }

        function createSsjAuraAnimation(scene) {
            createAnimation(scene, {
                key: SSJ_AURA_ANIM_KEY,
                textureKey: SSJ_AURA_TEXTURE_KEY,
                frameCount: SSJ_AURA_FRAME_COUNT,
                frameRate: 12,
                repeat: -1
            });
        }

        function addArenaBackground(scene) {
            const background = scene.add.image(640, 360, BACKGROUND_TEXTURE_KEY).setDepth(-30);
            const texture = scene.textures.get(BACKGROUND_TEXTURE_KEY);
            if (texture && typeof texture.setFilter === "function") {
                texture.setFilter(Phaser.Textures.FilterMode.LINEAR);
            }

            const source = texture && typeof texture.getSourceImage === "function"
                ? texture.getSourceImage()
                : null;

            if (source && source.width > 0 && source.height > 0) {
                const scale = Math.max(1280 / source.width, 720 / source.height);
                background.setScale(scale);
            } else {
                background.setDisplaySize(1280, 720);
            }
        }

        function createAnimationSet(scene, prefix, sheets) {
            for (const [formName, formSheets] of Object.entries(sheets)) {
                const baseKey = prefix + "-" + formName;

                createAnimation(scene, {
                    key: baseKey + "-attack-1",
                    textureKey: formSheets.attack1.textureKey,
                    frameCount: formSheets.attack1.frameCount,
                    frameRate: 14,
                    repeat: 0
                });

                createAnimation(scene, {
                    key: baseKey + "-attack-2",
                    textureKey: formSheets.attack2.textureKey,
                    frameCount: formSheets.attack2.frameCount,
                    frameRate: 14,
                    repeat: 0
                });

                createAnimation(scene, {
                    key: baseKey + "-defend",
                    textureKey: formSheets.defend.textureKey,
                    frameCount: formSheets.defend.frameCount,
                    frameRate: 9,
                    repeat: -1
                });

                createAnimation(scene, {
                    key: baseKey + "-walk",
                    textureKey: formSheets.walk.textureKey,
                    frameCount: formSheets.walk.frameCount,
                    frameRate: 11,
                    repeat: -1
                });

                createAnimation(scene, {
                    key: baseKey + "-hurt",
                    textureKey: formSheets.hurt.textureKey,
                    frameCount: formSheets.hurt.frameCount,
                    frameRate: 11,
                    repeat: 0
                });

                createAnimation(scene, {
                    key: baseKey + "-dead",
                    textureKey: formSheets.dead.textureKey,
                    frameCount: formSheets.dead.frameCount,
                    frameRate: 8,
                    repeat: 0
                });
            }
        }

        function createSummonAnimations(scene) {
            for (const [summonId, summonDef] of Object.entries(SUMMON_DEFS)) {
                const keys = SUMMON_TEXTURE_KEYS[summonId];
                if (!keys) {
                    continue;
                }

                createAnimation(scene, {
                    key: getSummonAnimKey(summonId, "run"),
                    textureKey: keys.run,
                    frameCount: summonDef.run.frameCount,
                    frameRate: summonDef.run.frameRate,
                    repeat: -1
                });

                createAnimation(scene, {
                    key: getSummonAnimKey(summonId, "jump"),
                    textureKey: keys.jump,
                    frameCount: summonDef.jump.frameCount,
                    frameRate: summonDef.jump.frameRate,
                    repeat: 0
                });

                createAnimation(scene, {
                    key: getSummonAnimKey(summonId, "cast"),
                    textureKey: keys.cast,
                    frameCount: summonDef.cast.frameCount,
                    frameRate: summonDef.cast.frameRate,
                    repeat: 0
                });

                createAnimation(scene, {
                    key: getSummonAnimKey(summonId, "hurt"),
                    textureKey: keys.hurt,
                    frameCount: summonDef.hurt.frameCount,
                    frameRate: summonDef.hurt.frameRate,
                    repeat: 0
                });

                const explosionAnimKey = getSummonExplosionAnimKey(summonId);
                if (!scene.anims.exists(explosionAnimKey)) {
                    const explosionFrames = [];
                    for (let i = 1; i <= SUMMON_EXPLOSION_FRAME_TOTAL; i += 1) {
                        explosionFrames.push({ key: getSummonExplosionFrameKey(summonId, i) });
                    }

                    scene.anims.create({
                        key: explosionAnimKey,
                        frames: explosionFrames,
                        frameRate: 18,
                        repeat: 0
                    });
                }
            }
        }

        function createAnimation(scene, options) {
            if (scene.anims.exists(options.key)) {
                return;
            }

            if (!Number.isInteger(options.frameCount) || options.frameCount < 1) {
                return;
            }

            scene.anims.create({
                key: options.key,
                frames: scene.anims.generateFrameNumbers(options.textureKey, {
                    start: 0,
                    end: options.frameCount - 1
                }),
                frameRate: options.frameRate,
                repeat: options.repeat
            });
        }

        function createFighterView(scene, options) {
            const container = scene.add.container(options.x, options.y);

            const sprite = scene.add.sprite(0, 0, options.textureKey).play(getDefendAnimKeyForForm(options.animPrefix, FORM_KNIGHT));
            sprite.setOrigin(0.5, 1);
            sprite.setScale(options.scale || 1);
            sprite.setPosition(0, options.spriteOffsetY || 0);
            if (SPRITE_CROP_LEFT > 0 || SPRITE_CROP_RIGHT > 0 || SPRITE_CROP_TOP > 0 || SPRITE_CROP_BOTTOM > 0) {
                sprite.setCrop(
                    SPRITE_CROP_LEFT,
                    SPRITE_CROP_TOP,
                    SPRITE_FRAME_WIDTH - SPRITE_CROP_LEFT - SPRITE_CROP_RIGHT,
                    SPRITE_FRAME_HEIGHT - SPRITE_CROP_TOP - SPRITE_CROP_BOTTOM
                );
            }
            setSpriteFacing(sprite, options.faceRight);
            const auraColor = options.auraColor || 0x60a5fa;
            const auraBody = scene.add.ellipse(
                0,
                -Math.round(sprite.displayHeight * 0.56),
                Math.round(sprite.displayWidth * 0.78),
                Math.round(sprite.displayHeight * 0.9),
                auraColor,
                0.19
            );
            auraBody.setBlendMode(Phaser.BlendModes.ADD);

            const ssjAura = scene.add.sprite(0, -Math.round(sprite.displayHeight * 0.58), SSJ_AURA_TEXTURE_KEY, 0);
            ssjAura.setBlendMode(Phaser.BlendModes.ADD);
            ssjAura.setDisplaySize(
                Math.round(sprite.displayWidth * 1.34),
                Math.round(sprite.displayHeight * 1.52)
            );
            ssjAura.setAlpha(0.38);
            ssjAura.setVisible(false);
            setSpriteFacing(ssjAura, options.faceRight);
            if (scene.anims.exists(SSJ_AURA_ANIM_KEY)) {
                ssjAura.play(SSJ_AURA_ANIM_KEY, true);
            }

            const swordAura = scene.add.circle(
                options.dashDirection * Math.round(sprite.displayWidth * 0.24),
                -Math.round(sprite.displayHeight * 0.57),
                Math.max(10, Math.round(sprite.displayWidth * 0.08)),
                auraColor,
                0.32
            );
            swordAura.setBlendMode(Phaser.BlendModes.ADD);
            swordAura.setVisible(false);

            scene.tweens.add({
                targets: auraBody,
                alpha: { from: 0.12, to: 0.28 },
                scaleX: { from: 0.94, to: 1.08 },
                scaleY: { from: 0.9, to: 1.1 },
                yoyo: true,
                repeat: -1,
                duration: 520,
                ease: "Sine.easeInOut"
            });

            scene.tweens.add({
                targets: swordAura,
                alpha: { from: 0.12, to: 0.5 },
                scaleX: { from: 0.85, to: 1.3 },
                scaleY: { from: 0.85, to: 1.3 },
                yoyo: true,
                repeat: -1,
                duration: 220,
                ease: "Sine.easeInOut"
            });

            scene.tweens.add({
                targets: ssjAura,
                alpha: { from: 0.24, to: 0.58 },
                scaleX: { from: 0.94, to: 1.08 },
                scaleY: { from: 0.94, to: 1.08 },
                yoyo: true,

                duration: 260,
                ease: "Sine.easeInOut"
            });

            const hpY = -Math.round(sprite.displayHeight) - 46;
            const nameY = hpY - 34;
            const streakY = nameY - 24;
            const championY = streakY - 22;
            const crownY = championY - 22;

            const crownDisplay = createGeneratedCrown(scene, crownY);

            const championText = scene.add.text(0, championY, "CHAMPION", {
                fontFamily: "Segoe UI",
                fontSize: "13px",
                color: "#fef08a",
                fontStyle: "bold"
            }).setOrigin(0.5);
            championText.setStroke("#7f1d1d", 4);
            championText.setVisible(false);

            const streakText = scene.add.text(0, streakY, "", {
                fontFamily: "Segoe UI",
                fontSize: "16px",
                color: "#fde68a",
                fontStyle: "bold"
            }).setOrigin(0.5);
            streakText.setStroke("#7f1d1d", 4);
            streakText.setVisible(false);

            const nameText = scene.add.text(0, nameY, "-", {
                fontFamily: "Segoe UI",
                fontSize: "23px",
                color: "#ffffff",
                fontStyle: "bold"
            }).setOrigin(0.5);
            nameText.setStroke("#0f172a", 5);

            const hpBg = scene.add.rectangle(0, hpY, 220, 18, 0x1f2937, 0.9)
                .setStrokeStyle(2, 0xffffff, 0.35);

            const hpFill = scene.add.rectangle(-109, hpY, 216, 12, 0x22c55e, 1)
                .setOrigin(0, 0.5);

            const hpText = scene.add.text(0, hpY, "HP 30/30", {
                fontFamily: "Segoe UI",
                fontSize: "12px",
                color: "#ffffff",

            }).setOrigin(0.5);

            container.add([auraBody, ssjAura, swordAura, sprite, crownDisplay, championText, streakText, nameText, hpBg, hpFill, hpText]);
            container.setVisible(false);
            container.setDepth(options.baseDepth || 10);

            return {
                container,
                sprite,
                auraBody,
                ssjAura,
                swordAura,
                auraColor,
                crownDisplay,
                championText,
                streakText,
                nameText,
                hpFill,
                hpText,
                dashDirection: options.dashDirection,
                animPrefix: options.animPrefix,
                baseDepth: options.baseDepth || 10,
                homeX: options.x,
                homeY: options.y,
                playerUsername: "",
                isAttacking: false,
                hasSword: false,
                ssjActive: false,
                ssjTier: 0,
                ssjAuraMode: "base",
                form: FORM_KNIGHT,
                currentHp: 0,
                currentMaxHp: 0,
                isDeadAnimating: false
            };
        }

        function createGeneratedCrown(scene, y) {
            const crownContainer = scene.add.container(0, y);

            const glow = scene.add.ellipse(0, 6, 104, 34, 0xf59e0b, 0.22);
            glow.setBlendMode(Phaser.BlendModes.ADD);

            const crown = scene.add.graphics();
            crown.fillStyle(0xfbbf24, 1);
            crown.fillRoundedRect(-42, 8, 84, 18, 5);
            crown.fillTriangle(-38, 8, -24, -24, -10, 8);
            crown.fillTriangle(-10, 8, 0, -34, 10, 8);
            crown.fillTriangle(10, 8, 24, -24, 38, 8);
            crown.lineStyle(2, 0x78350f, 0.9);
            crown.strokeRoundedRect(-42, 8, 84, 18, 5);
            crown.strokeTriangle(-38, 8, -24, -24, -10, 8);
            crown.strokeTriangle(-10, 8, 0, -34, 10, 8);
            crown.strokeTriangle(10, 8, 24, -24, 38, 8);

            const gemLeft = scene.add.circle(-20, -6, 4, 0x60a5fa, 1).setStrokeStyle(2, 0x0f172a, 0.7);
            const gemMid = scene.add.circle(0, -14, 5, 0xf43f5e, 1).setStrokeStyle(2, 0x7f1d1d, 0.85);
            const gemRight = scene.add.circle(20, -6, 4, 0x34d399, 1).setStrokeStyle(2, 0x064e3b, 0.85);

            const sparkA = scene.add.circle(-10, -28, 1.8, 0xfffbeb, 0.9);
            const sparkB = scene.add.circle(12, -31, 1.6, 0xfffbeb, 0.85);

            crownContainer.add([glow, crown, gemLeft, gemMid, gemRight, sparkA, sparkB]);
            crownContainer.setVisible(false);

            scene.tweens.add({
                targets: crownContainer,
                y: { from: y - 1, to: y + 1 },
                duration: 700,
                ease: "Sine.easeInOut",
                yoyo: true,
                repeat: -1
            });

            scene.tweens.add({
                targets: glow,
                alpha: { from: 0.14, to: 0.3 },
                duration: 440,
                ease: "Sine.easeInOut",
                yoyo: true,
                repeat: -1
            });

            scene.tweens.add({
                targets: [sparkA, sparkB],
                alpha: { from: 0.25, to: 0.95 },
                scaleX: { from: 0.7, to: 1.25 },
                scaleY: { from: 0.7, to: 1.25 },
                duration: 320,
                ease: "Sine.easeInOut",
                yoyo: true,
                repeat: -1
            });

            return crownContainer;
        }

        function resetViewTransform(view) {
            if (!view) {
                return;
            }

            if (sceneRef) {
                sceneRef.tweens.killTweensOf(view.container);
            }

            view.container.x = view.homeX;
            view.container.y = view.homeY;
            view.container.setDepth(view.baseDepth || 10);
            view.sprite.clearTint();
            updateAuraForView(view);
        }

        function setSpriteFacing(sprite, faceRight) {
            const flipX = SPRITE_NATIVE_FACING_RIGHT ? !faceRight : faceRight;
            sprite.setFlipX(flipX);
        }

        function updateAuraForView(view) {
            if (!view || !view.auraBody || !view.swordAura || !view.ssjAura) {
                return;
            }

            const hasPlayer = Boolean(view.playerUsername && view.container.visible);
            const baseAlpha = view.ssjActive
                ? (view.hasSword ? 0.2 : 0.13)
                : (view.hasSword ? 0.23 : 0.15);

            view.auraBody.setVisible(hasPlayer);
            view.auraBody.setAlpha(baseAlpha);
            view.auraBody.setFillStyle(view.auraColor, baseAlpha);
            view.auraBody.y = -Math.round(view.sprite.displayHeight * 0.56);
            view.auraBody.setDisplaySize(
                Math.round(view.sprite.displayWidth * 0.78),
                Math.round(view.sprite.displayHeight * 0.9)
            );

            view.swordAura.x = view.dashDirection * Math.round(view.sprite.displayWidth * 0.24);
            view.swordAura.y = -Math.round(view.sprite.displayHeight * 0.57);
            const swordRadius = Math.max(10, Math.round(view.sprite.displayWidth * 0.08));
            if (typeof view.swordAura.setRadius === "function") {
                view.swordAura.setRadius(swordRadius);
            } else {
                view.swordAura.setDisplaySize(swordRadius * 2, swordRadius * 2);
            }
            view.swordAura.setFillStyle(view.auraColor, 0.34);
            view.swordAura.setVisible(hasPlayer && view.hasSword);

            const ssjVisible = hasPlayer && view.ssjActive && !view.isDeadAnimating && view.currentHp > 0;
            syncSsjAuraMode(view);
            updateSsjAuraPlacement(view);
            view.ssjAura.setVisible(ssjVisible);
            battleFx.syncSsjAuraAudio(view.animPrefix, ssjVisible);
        }

        function syncSsjAuraMode(view) {
            if (!view || !view.ssjAura) {
                return;
            }

            if (view.ssjAuraMode === "base") {
                return;
            }

            const auraScene = view.ssjAura.scene;
            view.ssjAuraMode = "base";
            view.ssjAura.stop();
            view.ssjAura.setTexture(SSJ_AURA_TEXTURE_KEY, 0);
            if (auraScene && auraScene.anims.exists(SSJ_AURA_ANIM_KEY)) {
                view.ssjAura.play(SSJ_AURA_ANIM_KEY, true);
            }
        }

        function updateSsjAuraPlacement(view) {
            if (!view || !view.sprite || !view.ssjAura) {
                return;
            }

            const isTengu = view.form === FORM_TENGU;
            const ssjWidthScale = isTengu ? 1.42 : 1.34;
            const ssjHeightScale = isTengu ? 1.64 : 1.52;
            const ssjBaseY = -Math.round(view.sprite.displayHeight * (isTengu ? 0.56 : 0.51));

            view.ssjAura.setFlipX(view.sprite.flipX);
            view.ssjAura.setDisplaySize(
                Math.round(view.sprite.displayWidth * ssjWidthScale),
                Math.round(view.sprite.displayHeight * ssjHeightScale)
            );

            const currentAnimKey = view.sprite.anims.currentAnim?.key || "";
            const isWalking = currentAnimKey.endsWith("-walk");
            const walkForwardShift = isWalking
                ? view.dashDirection * Math.round(view.sprite.displayWidth * (isTengu ? 0.05 : 0.06))
                : 0;
            const walkFrame = Number(view.sprite.anims.currentFrame?.index) || 0;
            const walkBob = isWalking
                ? (walkFrame % 2 === 0 ? -1 : 1) * Math.max(1, Math.round(view.sprite.displayHeight * 0.01))
                : 0;

            const spriteCenterBias = view.sprite.flipX
                ? Math.round(view.sprite.displayWidth * (isTengu ? 0.02 : 0.026))
                : -Math.round(view.sprite.displayWidth * (isTengu ? 0.02 : 0.026));
            const auraTextureBias = view.ssjAura.flipX
                ? Math.round(view.ssjAura.displayWidth * (isTengu ? 0.05 : 0.09))
                : -Math.round(view.ssjAura.displayWidth * (isTengu ? 0.05 : 0.09));
            const inwardCombatBias = view.dashDirection * Math.round(view.sprite.displayWidth * (isTengu ? 0.012 : 0.018));
            const challengerKnightNudge = (!isTengu && view.dashDirection < 0)
                ? SSJ_AURA_KNIGHT_CHALLENGER_NUDGE_X
                : 0;

            view.ssjAura.x = spriteCenterBias + auraTextureBias + inwardCombatBias + walkForwardShift + challengerKnightNudge;
            view.ssjAura.y = ssjBaseY + walkBob;
        }

        function bindControls() {
            ui.joinBtn.addEventListener("click", () => {
                battleFx.unlockAudio();
                const username = ui.viewerName.value.trim();
                if (!username) {
                    return;
                }

                socket.emit("join", username);
                if (!ui.giftUser.value.trim()) {
                    ui.giftUser.value = username;
                }
            });

            ui.leaveBtn.addEventListener("click", () => {
                battleFx.unlockAudio();
                const username = ui.viewerName.value.trim();
                if (!username) {
                    return;
                }

                socket.emit("leave", username);
            });

            ui.giftBtn.addEventListener("click", () => {
                battleFx.unlockAudio();
                const username = ui.giftUser.value.trim();
                const gift = ui.giftType.value;
                if (!username || !gift) {
                    return;
                }

                socket.emit("gift", { username, gift });
            });

            ui.viewerName.addEventListener("keydown", (event) => {
                if (event.key === "Enter") {
                    ui.joinBtn.click();
                }
            });

            ui.giftUser.addEventListener("keydown", (event) => {
                if (event.key === "Enter") {
                    ui.giftBtn.click();
                }
            });
        }

        function applyPendingArenaState(scene, options) {
            const deferred = pendingArenaState;
            pendingArenaState = null;
            if (!deferred) {
                return;
            }

            applyArenaState(deferred);
            if (options?.replayAttack) {
                maybeAnimateLastAttack(scene, deferred.lastAttack);
            }
            updateHud(deferred);
        }

        function schedulePendingArenaApply(scene, deferMs, options) {
            if (!scene) {
                return;
            }

            const delayMs = Math.max(0, Number(deferMs) || 0);
            if (deathApplyDelayTimer) {
                deathApplyDelayTimer.remove(false);
                deathApplyDelayTimer = null;
            }

            deathApplyDelayTimer = scene.time.delayedCall(delayMs, () => {
                deathApplyDelayTimer = null;
                summonInProgress = false;
                applyPendingArenaState(scene, options);

                if (bufferedArenaState) {
                    const buffered = bufferedArenaState;
                    bufferedArenaState = null;
                    renderArena(buffered);
                }
            });
        }

        function renderArena(arena) {
            if (!sceneRef || !arena) {
                return;
            }

            if (deathApplyDelayTimer) {
                bufferedArenaState = arena;
                updateHud(arena);
                return;
            }

            const incomingGift = arena.lastGift;
            const isNewSummonGift = Boolean(
                incomingGift &&
                incomingGift.kind === "summon" &&
                incomingGift.id &&
                incomingGift.id !== lastGiftId
            );

            if (isNewSummonGift) {
                const summonViews = resolveSummonViews(incomingGift);
                if (summonViews) {
                    const result = maybeAnimateLastGift(sceneRef, incomingGift);
                    const giftKillDelay = Boolean(incomingGift?.died) ? DEATH_TRANSITION_DELAY_MS : 1000;
                    const deferMs = Math.max(giftKillDelay, Number(result?.deferStateApplyMs) || giftKillDelay);

                    pendingArenaState = arena;
                    schedulePendingArenaApply(sceneRef, deferMs, { replayAttack: true });

                    updateHud(arena);
                    return;
                }

                lastGiftId = incomingGift.id;
            }

            const incomingAttack = arena.lastAttack;
            const isNewAttack = Boolean(
                incomingAttack &&
                incomingAttack.id &&
                incomingAttack.id !== lastAttackId
            );

            if (isNewAttack) {
                const attackViews = resolveAttackViews(incomingAttack);
                if (attackViews) {
                    const result = maybeAnimateLastAttack(sceneRef, incomingAttack);
                    if (result?.queued || result?.blocked) {
                        pendingArenaState = arena;
                        updateHud(arena);
                        return;
                    }

                    const deferMs = Math.max(120, Number(result?.deferStateApplyMs) || 0);
                    if (deferMs > 0) {
                        pendingArenaState = arena;
                        schedulePendingArenaApply(sceneRef, deferMs);
                        updateHud(arena);
                        return;
                    }

                    updateHud(arena);
                    return;
                }
            }

            applyArenaState(arena);
            maybeAnimateLastAttack(sceneRef, arena.lastAttack);
            updateHud(arena);
        }

        function applyArenaState(arena) {
            applyPlayerToView(championView, arena.champion);
            applyPlayerToView(challengerView, arena.challenger);

            if (!arena.champion || !arena.challenger) {
                introPairKey = "";
                introInProgress = false;
                queuedAttackDuringIntro = null;
                bufferedArenaState = null;
                return;
            }

            updateHomePositionsForForms();
            maybeStartFightIntro(sceneRef);
        }

        function updateHomePositionsForForms() {
            if (!championView || !challengerView) {
                return;
            }

            const championIsTengu = championView.form === FORM_TENGU;
            const challengerIsTengu = challengerView.form === FORM_TENGU;
            const bothTengu = championIsTengu && challengerIsTengu;
            const mixedForm = championIsTengu !== challengerIsTengu;

            let championHomeX = 570;
            let challengerHomeX = 710;

            if (bothTengu) {
                championHomeX = 548;
                challengerHomeX = 732;
            } else if (mixedForm) {
                championHomeX = 560;
                challengerHomeX = 720;
            }

            championView.homeX = championHomeX;
            challengerView.homeX = challengerHomeX;

            if (!introInProgress && !championView.isAttacking && !championView.isDeadAnimating) {
                championView.container.x = championHomeX;
            }

            if (!introInProgress && !challengerView.isAttacking && !challengerView.isDeadAnimating) {
                challengerView.container.x = challengerHomeX;
            }
        }

        function maybeStartFightIntro(scene) {
            if (!scene || !championView || !challengerView) {
                return;
            }

            if (!championView.playerUsername || !challengerView.playerUsername) {
                return;
            }

            if (deathApplyDelayTimer) {
                return;
            }

            if (summonInProgress) {
                return;
            }

            const pairKey = championView.playerUsername + "|" + challengerView.playerUsername;
            if (pairKey === introPairKey || introInProgress) {
                return;
            }

            introPairKey = pairKey;
            introInProgress = true;

            scene.tweens.killTweensOf(championView.container);
            scene.tweens.killTweensOf(challengerView.container);

            const bothTengu = championView.form === FORM_TENGU && challengerView.form === FORM_TENGU;
            const introOffset = bothTengu ? 72 : 52;
            championView.container.x = championView.homeX - introOffset;
            challengerView.container.x = challengerView.homeX + introOffset;

            championView.sprite.play(getWalkAnimKey(championView), true);
            challengerView.sprite.play(getWalkAnimKey(challengerView), true);

            spawnFightStartText(scene, FIGHT_READY_DELAY_MS);

            let completedCount = 0;
            const onIntroDone = () => {
                completedCount += 1;
                if (completedCount < 2) {
                    return;
                }

                championView.sprite.play(getDefendAnimKey(championView), true);
                challengerView.sprite.play(getDefendAnimKey(challengerView), true);

                const waitAfterWalkMs = Math.max(0, FIGHT_READY_DELAY_MS - INTRO_WALK_MS);
                scene.time.delayedCall(waitAfterWalkMs, () => {
                    if (introPairKey !== pairKey) {
                        return;
                    }

                    introInProgress = false;
                    if (queuedAttackDuringIntro) {
                        const queued = queuedAttackDuringIntro;
                        queuedAttackDuringIntro = null;
                        const queuedResult = maybeAnimateLastAttack(scene, queued);
                        if (queuedResult?.blocked || queuedResult?.queued) {
                            return;
                        }

                        if (pendingArenaState) {
                            const queuedDeferMs = Math.max(120, Number(queuedResult?.deferStateApplyMs) || 0);
                            if (queuedDeferMs > 0) {
                                schedulePendingArenaApply(scene, queuedDeferMs);
                            } else {
                                applyPendingArenaState(scene);
                            }
                        }
                    }
                });
            };

            scene.tweens.add({
                targets: championView.container,
                x: championView.homeX,
                duration: INTRO_WALK_MS,
                ease: "Quad.easeOut",
                onComplete: onIntroDone
            });

            scene.tweens.add({
                targets: challengerView.container,
                x: challengerView.homeX,
                duration: INTRO_WALK_MS,
                ease: "Quad.easeOut",
                onComplete: onIntroDone
            });
        }

        function spawnFightStartText(scene, holdMs) {
            if (!scene) {
                return;
            }

            battleFx.playFightStart();
            const duration = Math.max(400, Number(holdMs) || FIGHT_READY_DELAY_MS);

            const fightText = scene.add.text(640, 330, "FIGHT", {

                fontSize: "92px",
                fontStyle: "900",

            }).setOrigin(0.5).setDepth(80);

            fightText.setStroke("#7f1d1d", 12);
            fightText.setScale(1);
            fightText.setAlpha(1);

            scene.tweens.add({
                targets: fightText,
                scaleX: 1.22,
                scaleY: 1.22,
                alpha: 0,
                y: 300,
                duration,
                ease: "Cubic.easeOut",
                onComplete: () => {
                    fightText.destroy();
                }
            });
        }

        function spawnLoseText(scene) {
            if (!scene) {
                return;
            }

            battleFx.playYouLose();
            const duration = DEATH_TRANSITION_DELAY_MS;

            const loseText = scene.add.text(640, 336, "Yo Lose", {
                fontFamily: "Segoe UI",
                fontSize: "86px",
                fontStyle: "900",
                color: "#fecaca"
            }).setOrigin(0.5).setDepth(81);

            loseText.setStroke("#7f1d1d", 11);

            scene.tweens.add({
                targets: loseText,
                scaleX: 1.24,
                scaleY: 1.24,
                alpha: 0,
                y: 302,
                duration,
                ease: "Cubic.easeOut",
                onComplete: () => {
                    loseText.destroy();
                }
