        function applyPlayerToView(view, player) {
            if (!view) {
                return;
            }

            if (!player) {
                resetViewTransform(view);
                view.playerUsername = "";
                view.container.setVisible(false);
                view.isAttacking = false;
                view.hasSword = false;
                view.ssjActive = false;
                view.ssjTier = 0;
                view.ssjAuraMode = "base";
                view.form = FORM_KNIGHT;
                view.currentHp = 0;
                view.currentMaxHp = 0;
                view.isDeadAnimating = false;
                if (view.crownDisplay) {
                    view.crownDisplay.setVisible(false);
                }
                if (view.championText) {
                    view.championText.setVisible(false);
                }
                if (view.streakText) {
                    view.streakText.setText("");
                    view.streakText.setVisible(false);
                }
                updateAuraForView(view);
                return;
            }

            const previousUsername = view.playerUsername;
            if (previousUsername && previousUsername !== player.username) {
                resetViewTransform(view);
                view.isAttacking = false;
                view.hasSword = false;
                view.ssjActive = false;
                view.ssjTier = 0;
                view.ssjAuraMode = "base";
                view.form = FORM_KNIGHT;
                view.currentHp = 0;
                view.currentMaxHp = 0;
                view.isDeadAnimating = false;
                if (view.crownDisplay) {
                    view.crownDisplay.setVisible(false);
                }
                if (view.championText) {
                    view.championText.setVisible(false);
                }
                if (view.streakText) {
                    view.streakText.setText("");
                    view.streakText.setVisible(false);
                }
            }

            const hadEvolutionBefore = view.hasSword;
            view.container.setVisible(true);
            view.playerUsername = player.username;
            view.hasSword = Boolean(player.hasSword);
            const nextForm = getFormFromEvolution(view.hasSword);
            if (view.form !== nextForm) {
                view.form = nextForm;
                if (!hadEvolutionBefore && nextForm === FORM_TENGU && sceneRef) {
                    battleFx.playEvolution();
                    playEvolutionOverlay(sceneRef, () => {
                        if (
                            view.playerUsername === player.username &&
                            view.form === FORM_TENGU &&
                            view.container.visible
                        ) {
                            spawnEvolutionPulse(sceneRef, view);
                        }
                    });
                }
            }

            view.currentHp = Number(player.hp) || 0;
            view.currentMaxHp = Number(player.maxHp) || 0;
            view.isDeadAnimating = false;

            const hpRatio = clamp(player.maxHp > 0 ? player.hp / player.maxHp : 0, 0, 1);
            const hpBarColor = hpRatio > 0.6 ? 0x22c55e : hpRatio > 0.3 ? 0xf59e0b : 0xef4444;
            const hpBarWidth = Math.max(2, 216 * hpRatio);
            const streakCount = Math.max(0, Number(player.winStreak) || 0);
            const showStreak = streakCount >= 2;
            const showChampionCrown = streakCount >= 10;
            view.ssjTier = streakCount;
            view.ssjActive = streakCount >= SSJ_AURA_WIN_STREAK && view.currentHp > 0;
            updateAuraForView(view);

            view.nameText.setText(player.hasSword ? player.username + " [TENGU]" : player.username);
            if (view.crownDisplay) {
                view.crownDisplay.setVisible(showChampionCrown);
            }
            if (view.championText) {
                view.championText.setText(showChampionCrown ? "CHAMPION" : "");
                view.championText.setVisible(showChampionCrown);
            }
            if (view.streakText) {
                view.streakText.setText(showStreak ? ("Win " + streakCount + "x") : "");
                view.streakText.setVisible(showStreak);
            }
            view.hpFill.displayWidth = hpBarWidth;
            view.hpFill.setFillStyle(hpBarColor, 1);
            view.hpText.setText("HP " + player.hp + "/" + player.maxHp);

            const defendAnim = getDefendAnimKey(view);
            if (!view.isAttacking && !view.isDeadAnimating && view.sprite.anims.currentAnim?.key !== defendAnim) {
                view.sprite.play(defendAnim, true);
            }
        }

        function resolveAttackViews(lastAttack) {
            if (!lastAttack) {
                return null;
            }

            if (championView.playerUsername === lastAttack.attacker) {
                return { attackerView: championView, targetView: challengerView };
            }

            if (challengerView.playerUsername === lastAttack.attacker) {
                return { attackerView: challengerView, targetView: championView };
            }

            return null;
        }

        function resolveSummonViews(lastGift) {
            if (!lastGift) {
                return null;
            }

            if (
                championView.playerUsername === lastGift.caster &&
                challengerView.playerUsername === lastGift.target
            ) {
                return { casterView: championView, targetView: challengerView };
            }

            if (
                challengerView.playerUsername === lastGift.caster &&
                championView.playerUsername === lastGift.target
            ) {
                return { casterView: challengerView, targetView: championView };
            }

            return null;
        }

        function maybeAnimateLastGift(scene, lastGift) {
            if (
                !lastGift ||
                !lastGift.id ||
                lastGift.id === lastGiftId ||
                lastGift.kind !== "summon"
            ) {
                return;
            }

            const summonViews = resolveSummonViews(lastGift);
            if (!summonViews) {
                lastGiftId = lastGift.id;
                return;
            }

            lastGiftId = lastGift.id;
            return playSummonAnimation(scene, summonViews.casterView, summonViews.targetView, {
                summonId: String(lastGift.summon || ""),
                damage: Math.max(0, Number(lastGift.damage) || 0),
                died: Boolean(lastGift.died)
            });
        }

        function playSummonAnimation(scene, casterView, targetView, summonInfo) {
            if (!scene || !casterView || !targetView) {
                return;
            }

            const summonDef = SUMMON_DEFS[summonInfo.summonId];
            const summonKeys = SUMMON_TEXTURE_KEYS[summonInfo.summonId];
            if (!summonDef || !summonKeys) {
                summonInProgress = false;
                return;
            }

            summonInProgress = true;
            introInProgress = false;
            queuedAttackDuringIntro = null;
            casterView.isAttacking = false;
            targetView.isAttacking = false;
            casterView.isDeadAnimating = false;
            targetView.isDeadAnimating = false;

            scene.tweens.killTweensOf(casterView.container);
            scene.tweens.killTweensOf(targetView.container);
            casterView.container.x = casterView.homeX;
            targetView.container.x = targetView.homeX;
            casterView.sprite.play(getDefendAnimKey(casterView), true);
            targetView.sprite.play(getDefendAnimKey(targetView), true);

            const casterDirection = casterView.dashDirection;
            const summonFaceRight = casterDirection > 0;
            const summonScale = 2.3;
            const summonStartX = summonFaceRight ? -120 : 1400;
            const summonGroundY = casterView.container.y + 2;
            const summonRunEndX = casterView.container.x + (casterDirection * 136);
            const summonCastX = casterView.container.x + (casterDirection * 192);
            const summonAnimRun = getSummonAnimKey(summonInfo.summonId, "run");
            const summonAnimJump = getSummonAnimKey(summonInfo.summonId, "jump");
            const summonAnimCast = getSummonAnimKey(summonInfo.summonId, "cast");
            const summonRunSceneMs = 420;
            const summonJumpAscendMs = 240;
            const summonJumpDescendMs = 180;
            const summonJumpSceneMs = summonJumpAscendMs + summonJumpDescendMs;
            const summonCastSceneMs = Math.max(
                120,
                Number(getAnimationDurationMs(scene, summonAnimCast)) ||
                Number(summonDef.castDurationMs) ||
                900
            );
            const targetHurtAnim = getHurtAnimKey(targetView);
            const targetDeadAnim = getDeadAnimKey(targetView);
            const targetDefendAnim = getDefendAnimKey(targetView);
            const targetName = targetView.playerUsername;
            const hasSummonOverlay = hasSummonOverlayTexture(scene, summonInfo.summonId);
            const summonOverlayMs = hasSummonOverlay ? getSummonOverlayDurationMs(summonInfo.summonId) : 0;
            const targetBodyAnchor = getTargetBodyImpactPoint(targetView);
            const fireConvergeInwardShift = targetView.dashDirection * Math.round(targetView.sprite.displayWidth * 0.12);
            const fireConvergeX = targetBodyAnchor.x + fireConvergeInwardShift;
            const fireCastDistance = Math.max(112, Math.round(targetView.sprite.displayWidth * 0.39));
            const fireRunDistance = fireCastDistance + 68;

            const isDualFireWizard = summonInfo.summonId === "fire_wizard";
            const summonEntrants = isDualFireWizard
                ? [
                    {
                        startX: -120,
                        faceRight: true,
                        runEndX: fireConvergeX - fireRunDistance,
                        castX: fireConvergeX - fireCastDistance,
                        retreatDirection: -1,
                        impactDirection: 1
                    },
                    {
                        startX: 1400,
                        faceRight: false,
                        runEndX: fireConvergeX + fireRunDistance,
                        castX: fireConvergeX + fireCastDistance,
                        retreatDirection: 1,
                        impactDirection: -1
                    }
                ]
                : [
                    {
                        startX: summonStartX,
                        faceRight: summonFaceRight,
                        runEndX: summonRunEndX,
                        castX: summonCastX,
                        retreatDirection: casterDirection,
                        impactDirection: casterDirection
                    }
                ];

            const summonSprites = [];
            let castReadyCount = 0;
            let impactStarted = false;
            let cleanupDone = false;
            let summonOverlay = null;

            const cleanupSummon = () => {
                if (cleanupDone) {
                    return;
                }
                cleanupDone = true;
                summonInProgress = false;
                if (summonOverlay && summonOverlay.active) {
                    summonOverlay.destroy();
                }
                for (const sprite of summonSprites) {
                    if (sprite && sprite.active) {
                        sprite.destroy();
                    }
                }
            };

            const triggerExplosionAt = (x, y, direction, sizeScale) => {
                spawnSummonExplosionBurst(
                    scene,
                    summonInfo.summonId,
                    x,
                    y,
                    Math.max(80, Math.round(summonDef.explosionSize * (sizeScale || 1))),
                    direction,
                    (burstIndex) => {
                        const baseShake = summonInfo.summonId === "fire_wizard" ? 0.014 : 0.012;
                        battleFx.playSummonExplosion(summonInfo.summonId);
                        scene.cameras.main.shake(110 + (burstIndex * 40), baseShake + (burstIndex * 0.002));

                        targetView.sprite.setTintFill(0xfca5a5);
                        scene.time.delayedCall(90, () => {
                            if (targetView.playerUsername === targetName) {
                                targetView.sprite.clearTint();
                            }
                        });
                    }
                );
            };

            const applyHitVisuals = () => {
                if (summonInfo.died) {
                    targetView.isDeadAnimating = true;
                    targetView.sprite.play(targetDeadAnim, true);
                    updateAuraForView(targetView);
                    spawnLoseText(scene);
                } else {
                    targetView.sprite.play(targetHurtAnim, true);
                    scene.time.delayedCall(360, () => {
                        if (targetView.playerUsername === targetName && !targetView.isDeadAnimating) {
                            targetView.sprite.play(targetDefendAnim, true);
                        }
                    });
                }

                if (summonInfo.damage > 0) {
                    spawnDamageText(scene, targetView, summonInfo.damage, 0);
                }
            };

            const fadeOutSummoners = () => {
                let activeCount = 0;
                for (const [index, sprite] of summonSprites.entries()) {
                    if (!sprite || !sprite.active) {
                        continue;
                    }

                    activeCount += 1;
                    const entrant = summonEntrants[index];
                    scene.tweens.add({
                        targets: sprite,
                        x: sprite.x + (entrant.retreatDirection * 120),
                        alpha: 0,
                        duration: 280,
                        ease: "Cubic.easeIn",
                        onComplete: () => {
                            activeCount -= 1;
                            if (activeCount <= 0) {
                                cleanupSummon();
                            }
                        }
                    });
                }

                if (activeCount === 0) {
                    cleanupSummon();
                }
            };

            const startImpactPhase = () => {
                if (impactStarted) {
                    return;
                }
                impactStarted = true;

                scene.time.delayedCall(summonCastSceneMs, () => {
                    if (targetView.playerUsername !== targetName) {
                        cleanupSummon();
                        return;
                    }

                    const bodyImpact = getTargetBodyImpactPoint(targetView);
                    if (isDualFireWizard) {
                        const fireImpactX = fireConvergeX;
                        triggerExplosionAt(fireImpactX, bodyImpact.y, 1, 1.04);
                        scene.time.delayedCall(120, () => {
                            if (targetView.playerUsername !== targetName) {
                                return;
                            }
                            triggerExplosionAt(fireImpactX, bodyImpact.y - 4, -1, 1.04);
                        });
                    } else {
                        triggerExplosionAt(bodyImpact.x, bodyImpact.y, casterDirection, 1);
                    }

                    applyHitVisuals();
                    fadeOutSummoners();
                });
            };

            const startSummonEntrants = () => {
                summonEntrants.forEach((entrant, entrantIndex) => {
                    const summonSprite = scene.add
                        .sprite(entrant.startX, summonGroundY, summonKeys.run)
                        .setOrigin(0.5, 1)
                        .setScale(summonScale)
                        .setDepth(56);
                    setSpriteFacing(summonSprite, entrant.faceRight);
                    summonSprites.push(summonSprite);

                    battleFx.playSummonEnter(summonInfo.summonId);
                    if (entrantIndex === 0) {
                        battleFx.playSummonRun(summonInfo.summonId, summonRunSceneMs);
                    }
                    summonSprite.play(summonAnimRun, true);

                    scene.tweens.add({
                        targets: summonSprite,
                        x: entrant.runEndX,
                        duration: summonRunSceneMs,
                        ease: "Quad.easeOut",
                        onComplete: () => {
                            if (!summonSprite.active) {
                                cleanupSummon();
                                return;
                            }

                            summonSprite.play(summonAnimJump, true);
                            if (entrantIndex === 0) {
                                battleFx.playSummonJump(summonInfo.summonId, summonJumpSceneMs);
                            }
                            scene.tweens.add({
                                targets: summonSprite,
                                x: entrant.castX,
                                y: summonGroundY - 126,
                                duration: summonJumpAscendMs,
                                ease: "Sine.easeOut",
                                onComplete: () => {
                                    scene.tweens.add({
                                        targets: summonSprite,
                                        y: summonGroundY,
                                        duration: summonJumpDescendMs,
                                        ease: "Sine.easeIn",
                                        onComplete: () => {
                                            if (!summonSprite.active) {
                                                cleanupSummon();
                                                return;
                                            }

                                            summonSprite.play(summonAnimCast, true);
                                            if (castReadyCount === 0) {
                                                battleFx.playSummonCast(summonInfo.summonId, summonCastSceneMs);
                                            }
                                            castReadyCount += 1;
                                            if (castReadyCount >= summonEntrants.length) {
                                                startImpactPhase();
                                            }
                                        }
                                    });
                                }
                            });
                        }
                    });
                });
            };

            summonOverlay = playSummonOverlay(scene, summonInfo.summonId, () => {
                if (cleanupDone || targetView.playerUsername !== targetName) {
                    cleanupSummon();
                    return;
                }
                summonOverlay = null;
                startSummonEntrants();
            });

            const summonTravelMs = summonRunSceneMs + summonJumpSceneMs;
            const summonExplosionStaggerMs = isDualFireWizard ? 120 : 0;
            const summonFadeOutMs = 280;
            const summonDeadAnimMs = getAnimationDurationMs(scene, targetDeadAnim);
            const summonBaseDelayMs =
                summonOverlayMs +
                summonTravelMs +
                summonCastSceneMs +
                summonExplosionStaggerMs +
                summonFadeOutMs +
                260;
            const summonDeadDurationMs =
                summonOverlayMs +
                summonTravelMs +
                summonCastSceneMs +
                summonExplosionStaggerMs +
                summonDeadAnimMs +
                420;
            return {
                deferStateApplyMs: summonInfo.died
                    ? Math.max(DEATH_TRANSITION_DELAY_MS, summonBaseDelayMs, summonDeadDurationMs)
                    : summonBaseDelayMs
            };
        }

        function maybeAnimateLastAttack(scene, lastAttack) {
            if (!lastAttack || !lastAttack.id || lastAttack.id === lastAttackId) {
                return;
            }

            if (summonInProgress) {
                return { blocked: true };
            }

            if (introInProgress) {
                queuedAttackDuringIntro = lastAttack;
                return { queued: true };
            }

            const attackViews = resolveAttackViews(lastAttack);
            const attackerView = attackViews?.attackerView || null;
            const targetView = attackViews?.targetView || null;

            if (!attackerView || !targetView) {
                return;
            }

            lastAttackId = lastAttack.id;
            return playAttackAnimation(scene, attackerView, targetView, {
                useSword: Boolean(lastAttack.sword),
                damage: Number(lastAttack.totalDamage) || 0,
                hits: Number(lastAttack.hits) || 0,
                targetHpBefore: Number(lastAttack.targetHpBefore),
                targetHpAfter: Number(lastAttack.targetHpAfter),
                died: Boolean(lastAttack.died)
            });
        }

        function playAttackAnimation(scene, attackerView, targetView, attackInfo) {
            if (!attackerView.playerUsername || !targetView.playerUsername) {
                return;
            }

            scene.tweens.killTweensOf(attackerView.container);
            scene.tweens.killTweensOf(targetView.container);
            attackerView.container.x = attackerView.homeX;
            targetView.container.x = targetView.homeX;

            attackerView.isAttacking = true;
            attackerView.isDeadAnimating = false;

            const attackAnimKeys = getAttackAnimKeys(attackerView, attackInfo.useSword, attackInfo.hits);
            const attackerDefendAnim = getDefendAnimKey(attackerView);
            const targetDefendAnim = getDefendAnimKey(targetView);
            const targetHurtAnim = getHurtAnimKey(targetView);
            const targetDeadAnim = getDeadAnimKey(targetView);
            const attackerName = attackerView.playerUsername;
            const targetName = targetView.playerUsername;
            const totalDamage = Math.max(0, attackInfo.damage || 0);
            const attackerStartX = attackerView.homeX;
            const targetStartX = targetView.homeX;
            const distance = Math.abs(targetStartX - attackerStartX);
            const bothTengu = attackerView.form === FORM_TENGU && targetView.form === FORM_TENGU;
            const bothKnight = attackerView.form === FORM_KNIGHT && targetView.form === FORM_KNIGHT;
            const isKnightAttacker = attackerView.form === FORM_KNIGHT;
            const isTenguAttacker = attackerView.form === FORM_TENGU;
            const desiredGap = Math.max(
                bothTengu ? 196 : (bothKnight ? 58 : 92),
                ((attackerView.sprite.displayWidth + targetView.sprite.displayWidth) * (bothTengu ? 0.58 : (bothKnight ? 0.15 : 0.24)))
            );
            const approachTotal = Math.max(0, distance - desiredGap);
            let attackerAdvance = Math.min(bothTengu ? 90 : (bothKnight ? 138 : 122), approachTotal * (bothTengu ? 0.62 : (bothKnight ? 0.74 : 0.68)));
            let targetAdvance = Math.min(bothTengu ? 64 : (bothKnight ? 74 : 84), Math.max(0, approachTotal - attackerAdvance));
            if (approachTotal > 0 && attackerAdvance < 30) {
                attackerAdvance = Math.min(30, approachTotal);
                targetAdvance = Math.max(0, approachTotal - attackerAdvance);
            }
            const attackerCombatX = attackerStartX + attackerAdvance * attackerView.dashDirection;
            const targetCombatX = targetStartX - targetAdvance * attackerView.dashDirection;
            const knockbackBase = Math.min(26, Math.max(10, (distance - desiredGap) * 0.24));
            const strikeAnimKeys = attackAnimKeys.filter(
                (key) => key.endsWith("-attack-1") || key.endsWith("-attack-2")
            );
            const splitDamages = splitDamageAcrossHits(totalDamage, Math.max(1, strikeAnimKeys.length));
            const attackWillKill = Boolean(attackInfo.died || ((Number(attackInfo.targetHpAfter) || 0) <= 0));
            let nextImpactIndex = 0;
            let hasReturnedHome = false;
            let loseTextShown = false;
            const attackAnimDurationMs = getAnimationSequenceDurationMs(scene, attackAnimKeys);
            const deadAnimDurationMs = getAnimationDurationMs(scene, targetDeadAnim);

            const returnToHome = () => {
                if (hasReturnedHome) {
                    return;
                }
                hasReturnedHome = true;

                scene.tweens.add({
                    targets: attackerView.container,
                    x: attackerStartX,
                    duration: 180,
                    ease: "Cubic.easeIn",
                    onComplete: () => {
                        attackerView.container.setDepth(attackerView.baseDepth || 10);
                    }
                });

                scene.tweens.add({
                    targets: targetView.container,
                    x: targetStartX,
                    duration: 180,
                    ease: "Cubic.easeInOut"
                });
            };

            const returnAttackerHome = () => {
                if (hasReturnedHome) {
                    return;
                }
                hasReturnedHome = true;

                scene.tweens.add({
                    targets: attackerView.container,
                    x: attackerStartX,
                    duration: 180,
                    ease: "Cubic.easeIn",
                    onComplete: () => {
                        attackerView.container.setDepth(attackerView.baseDepth || 10);
                    }
                });
            };

            const applyImpact = (damage, impactIndex, isFinalHit) => {
                if (attackerView.playerUsername !== attackerName || targetView.playerUsername !== targetName) {
                    returnToHome();
                    return;
                }

                const targetShouldDie = attackWillKill && isFinalHit;
                const knockbackDistance = knockbackBase * (impactIndex === 0 ? 0.72 : 1);

                scene.tweens.add({
                    targets: targetView.container,
                    x: targetCombatX + knockbackDistance * attackerView.dashDirection,
                    duration: 95,
                    yoyo: true,
                    ease: "Quad.easeOut"
                });

                targetView.sprite.setTintFill(0xfca5a5);
                scene.time.delayedCall(95, () => {
                    targetView.sprite.clearTint();
                });

                battleFx.playImpact(attackInfo.useSword, impactIndex);
                spawnImpactBurst(scene, targetView, attackerView.dashDirection, attackInfo.useSword, impactIndex);

                if (targetShouldDie) {
                    targetView.isDeadAnimating = true;
                    targetView.sprite.play(targetDeadAnim, true);
                    updateAuraForView(targetView);
                    if (!loseTextShown) {
                        loseTextShown = true;
                        spawnLoseText(scene);
                    }
                } else {
                    targetView.sprite.play(targetHurtAnim, true);
                }
                if (damage > 0) {
                    spawnDamageText(scene, targetView, damage, impactIndex);
                }

                scene.cameras.main.shake(72 + (impactIndex * 34), attackInfo.useSword ? 0.010 : 0.008);

                if (isFinalHit) {
                    scene.time.delayedCall(targetShouldDie ? 260 : 150, () => {
                        if (targetView.playerUsername === targetName && !targetView.isAttacking) {
                            if (!targetShouldDie) {
                                targetView.sprite.play(targetDefendAnim, true);
                            }
                        }
                    });
                    if (targetShouldDie) {
                        returnAttackerHome();
                    } else {
                        returnToHome();
                    }
                }
            };

            scene.tweens.add({
                targets: attackerView.container,
                x: attackerCombatX,
                duration: 190,
                ease: "Cubic.easeOut",
                onStart: () => {
                    attackerView.container.setDepth((targetView.baseDepth || 10) + 1);
                    playAnimationSequence(
                        attackerView.sprite,
                        attackAnimKeys,
                        () => {
                            attackerView.isAttacking = false;
                            if (attackerView.playerUsername === attackerName) {
                                attackerView.sprite.play(attackerDefendAnim, true);
                            }
                        },
                        (animIndex, animKey) => {
                            if (attackerView.playerUsername !== attackerName) {
                                return;
                            }

                            const impactIndex = nextImpactIndex;
                            const splitIndex = Math.min(impactIndex, splitDamages.length - 1);
                            const hitDamage = splitDamages[splitIndex] || 0;
                            const isFinalHit = impactIndex >= (splitDamages.length - 1);
                            nextImpactIndex += 1;

                            spawnSlashTrail(scene, attackerView, attackInfo.useSword, impactIndex);
                            if (isKnightAttacker) {
                                battleFx.playKnightSlash(impactIndex);
                            } else if (isTenguAttacker) {
                                battleFx.playTenguSlash(impactIndex);
                            } else {
                                battleFx.playSwing(attackInfo.useSword, false, impactIndex);
                            }
                            scene.time.delayedCall(90 + (impactIndex * 12), () => {
                                applyImpact(hitDamage, impactIndex, isFinalHit);
                            });
                        }
                    );
                }
            });

            scene.tweens.add({
                targets: targetView.container,
                x: targetCombatX,
                duration: 190,
                ease: "Cubic.easeOut"
            });

            scene.time.delayedCall(900, () => {
                if (!hasReturnedHome) {
                    if (targetView.isDeadAnimating) {
                        returnAttackerHome();
                    } else {
                        returnToHome();
                    }
                }
            });

            const willKillTarget = attackWillKill;
            const impactLeadDelayMs = 190 + (90 + ((Math.max(1, strikeAnimKeys.length) - 1) * 12));
            const regularSequenceMs = impactLeadDelayMs + attackAnimDurationMs + 180;
            const lethalSequenceMs = impactLeadDelayMs + attackAnimDurationMs + deadAnimDurationMs + 220;
            return {
                deferStateApplyMs: willKillTarget
                    ? Math.max(DEATH_TRANSITION_DELAY_MS, lethalSequenceMs)
                    : Math.max(700, regularSequenceMs)
            };
        }

        function getAttackAnimKeys(view, useSword, hitCount) {
            const form = getFormFromEvolution(useSword);
            const keys = [];

            keys.push(getAnimKeyForForm(view.animPrefix, form, "attack-1"));
            if ((Number(hitCount) || 2) > 1) {
                keys.push(getAnimKeyForForm(view.animPrefix, form, "attack-2"));
            }
            return keys;
        }

        function getDefendAnimKey(view) {
            return getAnimKeyForForm(view.animPrefix, view.form, "defend");
        }

        function getWalkAnimKey(view) {
            return getAnimKeyForForm(view.animPrefix, view.form, "walk");
        }

        function getHurtAnimKey(view) {
            return getAnimKeyForForm(view.animPrefix, view.form, "hurt");
        }

        function getDeadAnimKey(view) {
            return getAnimKeyForForm(view.animPrefix, view.form, "dead");
        }

        function getDefendAnimKeyForForm(animPrefix, form) {
            return getAnimKeyForForm(animPrefix, form, "defend");
        }

        function getAnimKeyForForm(animPrefix, form, action) {
            return animPrefix + "-" + form + "-" + action;
        }

        function getFormFromEvolution(isEvolved) {
            return isEvolved ? FORM_TENGU : FORM_KNIGHT;
        }

        function getAnimationDurationMs(scene, animKey) {
            if (!scene || !animKey) {
                return 0;
            }

            const animation = scene.anims.get(animKey);
            if (!animation) {
                return 0;
            }

            const duration = Number(animation.duration) || 0;
            if (duration > 0) {
                return Math.round(duration);
            }

            const frameCount = Array.isArray(animation.frames)
                ? animation.frames.length
                : (Number(animation.getTotalFrames?.()) || 0);
            const frameRate = Number(animation.frameRate) || 0;
            if (frameCount > 0 && frameRate > 0) {
                return Math.round((frameCount / frameRate) * 1000);
            }

            const msPerFrame = Number(animation.msPerFrame) || 0;
            if (frameCount > 0 && msPerFrame > 0) {
                return Math.round(frameCount * msPerFrame);
            }

            return 0;
        }

        function getAnimationSequenceDurationMs(scene, animationKeys) {
            if (!Array.isArray(animationKeys) || animationKeys.length === 0) {
                return 0;
            }

            let total = 0;
            for (const animKey of animationKeys) {
                const duration = getAnimationDurationMs(scene, animKey);
                total += duration > 0 ? duration : 220;
            }
            return total;
        }

        function getSummonAnimKey(summonId, action) {
            return "summon-" + summonId + "-" + action;
        }

        function getSummonExplosionAnimKey(summonId) {
            return "summon-" + summonId + "-explosion";
        }

        function getSummonExplosionFrameKey(summonId, frameNumber) {
            return "summon-" + summonId + "-explosion-" + frameNumber;
        }

        function getSummonOverlayTextureKey(summonId) {
            const overlayDef = SUMMON_OVERLAY_TEXTURES[summonId];
            return overlayDef?.key || "";
        }

        function hasSummonOverlayTexture(scene, summonId) {
            const textureKey = getSummonOverlayTextureKey(summonId);
            return Boolean(scene && textureKey && scene.textures.exists(textureKey));
        }

        function getSummonOverlayDurationMs(summonId) {
            const durationMs = Number(battleFx.getSummonOverlayDurationMs(summonId)) || 0;
            return durationMs > 0 ? durationMs : SUMMON_OVERLAY_TOTAL_MS;
        }

        function playEvolutionOverlay(scene, onComplete) {
            return playSummonOverlay(scene, "tengu_evolve", onComplete);
        }

        function playSummonOverlay(scene, summonId, onComplete) {
            if (!scene) {
                if (typeof onComplete === "function") {
                    onComplete();
                }
                return null;
            }

            const textureKey = getSummonOverlayTextureKey(summonId);
            if (!textureKey || !scene.textures.exists(textureKey)) {
                if (typeof onComplete === "function") {
                    onComplete();
                }
                return null;
            }

            const overlayContainer = scene.add.container(640, 360).setDepth(74);
            const shade = scene.add.rectangle(0, 0, 1280, 720, 0x020617, 0.36);
            const overlayImage = scene.add.image(0, 0, textureKey);
            const texture = scene.textures.get(textureKey);
            const source = texture && typeof texture.getSourceImage === "function"
                ? texture.getSourceImage()
                : null;

            if (source && source.width > 0 && source.height > 0) {
                const fitScale = Math.min(1220 / source.width, 700 / source.height);
                overlayImage.setScale(fitScale);
            } else {
                overlayImage.setDisplaySize(1120, 620);
            }

            overlayContainer.add([shade, overlayImage]);
            overlayContainer.setAlpha(0);

            const totalDurationMs = getSummonOverlayDurationMs(summonId);
            const fadeDurationMs = Math.min(
                SUMMON_OVERLAY_FADE_MS,
                Math.max(80, Math.floor(totalDurationMs / 2))
            );
            const holdDurationMs = Math.max(0, totalDurationMs - (fadeDurationMs * 2));

            battleFx.playSummonOverlayAudio(summonId, totalDurationMs);

            scene.tweens.add({
                targets: overlayContainer,
                alpha: 1,
                duration: fadeDurationMs,
                ease: "Quad.easeOut",
                onComplete: () => {
                    scene.time.delayedCall(holdDurationMs, () => {
                        if (!overlayContainer.active) {
                            return;
                        }

                        scene.tweens.add({
                            targets: overlayContainer,
                            alpha: 0,
                            duration: fadeDurationMs,
                            ease: "Quad.easeIn",
                            onComplete: () => {
                                if (overlayContainer.active) {
                                    overlayContainer.destroy(true);
                                }
                                if (typeof onComplete === "function") {
                                    onComplete();
                                }
                            }
                        });
                    });
                }
            });

            return overlayContainer;
        }

        function spawnSummonExplosion(scene, summonId, x, y, size) {
            if (!scene) {
                return;
            }

            const firstFrameKey = getSummonExplosionFrameKey(summonId, 1);
            const explosionAnimKey = getSummonExplosionAnimKey(summonId);
            if (!scene.anims.exists(explosionAnimKey) || !scene.textures.exists(firstFrameKey)) {
                return;
            }

            const explosion = scene.add.sprite(x, y, firstFrameKey).setDepth(60);
            explosion.setBlendMode(Phaser.BlendModes.ADD);
            if (size > 0) {
                explosion.setDisplaySize(size, size);
            }

            explosion.once(Phaser.Animations.Events.ANIMATION_COMPLETE_KEY + explosionAnimKey, () => {
                explosion.destroy();
            });
            explosion.play(explosionAnimKey, true);
        }

        function getTargetBodyImpactPoint(targetView) {
            if (!targetView || !targetView.container || !targetView.sprite) {
                return { x: 640, y: 360 };
            }

            const visualCenterShift = targetView.sprite.flipX
                ? Math.round(targetView.sprite.displayWidth * 0.055)
                : -Math.round(targetView.sprite.displayWidth * 0.055);
            const bodyX = targetView.container.x + visualCenterShift;
            const bodyY = targetView.container.y - Math.round(targetView.sprite.displayHeight * 0.53);
            return { x: bodyX, y: bodyY };
        }

        function spawnSummonExplosionBurst(scene, summonId, x, y, size, direction, onBurst) {
            if (!scene) {
                return;
            }

            const safeDirection = direction >= 0 ? 1 : -1;

            const burstOffsets = [
                { x: 0, y: 0, scale: 1.06 },
                { x: -20 * safeDirection, y: -10, scale: 0.96 },
                { x: 22 * safeDirection, y: 8, scale: 1.14 }
            ];

            for (let burstIndex = 0; burstIndex < burstOffsets.length; burstIndex += 1) {
                const offset = burstOffsets[burstIndex];
                scene.time.delayedCall(burstIndex * 95, () => {
                    spawnSummonExplosion(
                        scene,
                        summonId,
                        x + offset.x,
                        y + offset.y,
                        Math.max(40, Math.round(size * offset.scale))
                    );

                    if (typeof onBurst === "function") {
                        onBurst(burstIndex);
                    }
                });
            }
        }

        function splitDamageAcrossHits(totalDamage, hitCount) {
            const safeHitCount = Math.max(1, Math.trunc(hitCount) || 1);
            const safeDamage = Math.max(0, Math.trunc(totalDamage) || 0);
            const perHit = Math.floor(safeDamage / safeHitCount);
            const remainder = safeDamage % safeHitCount;
            const result = [];

            for (let i = 0; i < safeHitCount; i += 1) {
                result.push(perHit + (i < remainder ? 1 : 0));
            }
            return result;
        }

        function playAnimationSequence(sprite, animationKeys, onComplete, onEachStart) {
            if (!sprite || !Array.isArray(animationKeys) || animationKeys.length === 0) {
                if (typeof onComplete === "function") {
                    onComplete();
                }
                return;
            }

            const playAtIndex = (index) => {
                const animKey = animationKeys[index];
                const completeEvent = Phaser.Animations.Events.ANIMATION_COMPLETE_KEY + animKey;

                sprite.once(completeEvent, () => {
                    if (index + 1 < animationKeys.length) {
                        playAtIndex(index + 1);
                        return;
                    }

                    if (typeof onComplete === "function") {
                        onComplete();
                    }
                });

                if (typeof onEachStart === "function") {
                    onEachStart(index, animKey);
                }
                sprite.play(animKey, true);
            };

            playAtIndex(0);
        }

        function createBattleFx() {
            let audioContext = null;

            const summonOverlayPlayers = Object.fromEntries(

            const htmlAudioPlayers = [

            const clampVolume = (value) => Math.min(1, Math.max(0.0001, value));

            const getHtmlClipDurationMs = (source) => {
                if (!source) {

            const unlockAudio = () => {
                const ctx = ensureAudio();
                if (!ctx) {

                if (ctx.state === "suspended") {

            const playTone = (options) => {
                const ctx = ensureAudio();
                if (!ctx || !masterGain) {
                    return;
                }

                const offset = Number(options.offset) || 0;
                const start = ctx.currentTime + Math.max(0, offset);
                const duration = Math.max(0.01, Number(options.duration) || 0.07);
                const release = Math.max(0.01, Number(options.release) || 0.08);
                const attack = Math.max(0.001, Number(options.attack) || 0.004);
                const fromFreq = Math.max(30, Number(options.fromFreq) || Number(options.freq) || 220);
                const toFreq = Math.max(30, Number(options.toFreq) || fromFreq);
                const volume = clampVolume(Number(options.volume) || 0.12);

                const oscillator = ctx.createOscillator();
                const gain = ctx.createGain();

                oscillator.type = options.type || "sine";
                oscillator.frequency.setValueAtTime(fromFreq, start);
                oscillator.frequency.exponentialRampToValueAtTime(toFreq, start + duration);

                if (Number.isFinite(options.detune)) {
                    oscillator.detune.setValueAtTime(options.detune, start);
                }

                gain.gain.setValueAtTime(0.0001, start);
                gain.gain.exponentialRampToValueAtTime(volume, start + attack);
                gain.gain.exponentialRampToValueAtTime(0.0001, start + duration + release);

                oscillator.connect(gain);
                gain.connect(masterGain);
                oscillator.start(start);
                oscillator.stop(start + duration + release + 0.02);
            };

            const playNoiseBurst = (options) => {
                const ctx = ensureAudio();
                if (!ctx || !masterGain) {
                    return;
                }

                const offset = Number(options.offset) || 0;
                const start = ctx.currentTime + Math.max(0, offset);
                const duration = Math.max(0.02, Number(options.duration) || 0.08);
                const volume = clampVolume(Number(options.volume) || 0.14);
                const release = Math.max(0.02, Number(options.release) || 0.09);
                const highpassFreq = Math.max(20, Number(options.highpass) || 70);
                const lowpassFrom = Math.max(120, Number(options.lowpassFrom) || 1500);
                const lowpassTo = Math.max(90, Number(options.lowpassTo) || 360);

                const sampleCount = Math.max(1, Math.floor(ctx.sampleRate * duration));
                const buffer = ctx.createBuffer(1, sampleCount, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < sampleCount; i += 1) {
                    const t = i / sampleCount;
                    const envelope = 1 - t;
                    data[i] = ((Math.random() * 2) - 1) * envelope;
                }

                const source = ctx.createBufferSource();
                source.buffer = buffer;

                const highpass = ctx.createBiquadFilter();
                highpass.type = "highpass";
                highpass.frequency.setValueAtTime(highpassFreq, start);

                const lowpass = ctx.createBiquadFilter();
                lowpass.type = "lowpass";
                lowpass.frequency.setValueAtTime(lowpassFrom, start);
                lowpass.frequency.exponentialRampToValueAtTime(lowpassTo, start + duration + release);

                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.0001, start);
                gain.gain.exponentialRampToValueAtTime(volume, start + 0.008);
                gain.gain.exponentialRampToValueAtTime(0.0001, start + duration + release);

                source.connect(highpass);
                highpass.connect(lowpass);
                lowpass.connect(gain);
                gain.connect(masterGain);

                source.start(start);
                source.stop(start + duration + release + 0.02);
            };

            const playSwing = (isSword, isRunAttack, hitIndex) => {
                const swordBoost = isSword ? 1.15 : 1;
                const hitBoost = Math.max(0, Number(hitIndex) || 0) * 18;
                playTone({
                    type: isSword ? "sawtooth" : "triangle",
                    fromFreq: (isRunAttack ? 240 : (isSword ? 200 : 145)) + hitBoost,
                    toFreq: (isRunAttack ? 740 : (isSword ? 590 : 310)) + hitBoost,
                    duration: isRunAttack ? 0.12 : (isSword ? 0.1 : 0.085),
                    release: 0.07,

                });

                    volume: isRunAttack ? 0.11 : (isSword ? 0.085 : 0.07),

                });

                });

            const createSsjAuraState = () => {

                standby.preload = "auto";

                if (!nextActive) {

                    state.intro.onended = null;
                    resetClip(state.intro);
                    resetClip(state.standby);

                    if (!state.active) {
                        return;
                    }

                    state.standby.currentTime = 0;
                    const standbyPlay = state.standby.play();
                    if (standbyPlay && typeof standbyPlay.catch === "function") {

                    }
                };

                state.intro.onended = () => {
                    state.intro.onended = null;
                    startStandbyLoop();

                state.intro.currentTime = 0;
                const introPlay = state.intro.play();
                if (introPlay && typeof introPlay.catch === "function") {

                        if (!state.active) {

            const playHtmlClip = (source, fallback) => {

                    duration: 0.08,
                    release: 0.06,
                    volume: 0.07,
                    highpass: isFire ? 180 : 260,
                    lowpassFrom: isFire ? 1200 : 1800,
                    lowpassTo: 640
                });
            };

            const playSummonCast = (summonId, castDurationMs) => {
                const isFire = summonId === "fire_wizard";
                if (isFire) {
                    playHtmlClipForDuration(fireAttackPlayer, castDurationMs, () => {
                        playTone({
                            type: "sawtooth",
                            fromFreq: 220,
                            toFreq: 920,
                            duration: 0.2,
                            release: 0.12,
                            volume: 0.15
                        });
                        playTone({
                            type: "sine",
                            fromFreq: 380,
                            toFreq: 650,
                            duration: 0.16,
                            release: 0.1,
                            volume: 0.09,
                            offset: 0.06
                        });
                    });
                    return;
                }

                if (summonId === "lightning_mage") {
                    playHtmlClip(lightningAttackPlayer, () => {
                        playTone({
                            type: "triangle",
                            fromFreq: 260,
                            toFreq: 980,
                            duration: 0.2,
                            release: 0.12,
                            volume: 0.15
                        });
                        playTone({
                            type: "sine",
                            fromFreq: 420,
                            toFreq: 760,
                            duration: 0.16,
                            release: 0.1,
                            volume: 0.09,
                            offset: 0.06
                        });
                    });
                    return;
                }

                playTone({
                    type: isFire ? "sawtooth" : "triangle",
                    fromFreq: isFire ? 220 : 260,
                    toFreq: isFire ? 920 : 980,
                    duration: 0.2,
                    release: 0.12,
                    volume: 0.15
                });
                playTone({
                    type: "sine",
                    fromFreq: isFire ? 380 : 420,
                    toFreq: isFire ? 650 : 760,
                    duration: 0.16,
                    release: 0.1,
                    volume: 0.09,
                    offset: 0.06
                });
            };

            const playSummonExplosion = (summonId) => {
                const isFire = summonId === "fire_wizard";
                if (isFire) {
                    playHtmlClip(fireBoomPlayer, () => {
                        playNoiseBurst({
                            duration: 0.18,
                            release: 0.12,
                            volume: 0.27,
                            highpass: 70,
                            lowpassFrom: 980,
                            lowpassTo: 240
                        });
                        playTone({
                            type: "square",
                            fromFreq: 210,
                            toFreq: 58,
                            duration: 0.18,
                            release: 0.11,
                            volume: 0.23
                        });
                    });
                    return;
                }

                if (summonId === "lightning_mage") {
                    playHtmlClip(lightningBoomPlayer, () => {
                        playNoiseBurst({
                            duration: 0.16,
                            release: 0.12,
                            volume: 0.24,
                            highpass: 90,
                            lowpassFrom: 1300,
                            lowpassTo: 260
                        });
                        playTone({
                            type: "sawtooth",
                            fromFreq: 270,
                            toFreq: 72,
                            duration: 0.18,
                            release: 0.11,
                            volume: 0.2
                        });
                    });
                    return;
                }

                playNoiseBurst({
                    duration: isFire ? 0.18 : 0.16,
                    release: 0.12,
                    volume: isFire ? 0.27 : 0.24,
                    highpass: isFire ? 70 : 90,
                    lowpassFrom: isFire ? 980 : 1300,
                    lowpassTo: isFire ? 240 : 260
                });
                playTone({
                    type: isFire ? "square" : "sawtooth",
                    fromFreq: isFire ? 210 : 270,
                    toFreq: isFire ? 58 : 72,
                    duration: 0.18,
                    release: 0.11,
                    volume: isFire ? 0.23 : 0.2
                });
            };

            return {
                unlockAudio,
                playSwing,
                playKnightSlash,
                playTenguSlash,
                syncSsjAuraAudio,
                playFightStart,
                playYouLose,
                playImpact,
                playEvolution,
                playSummonOverlayAudio,
                playSummonRun,
                playSummonJump,
                playSummonEnter,
                playSummonCast,
                playSummonExplosion,
                getSummonOverlayDurationMs
            };
        }

        function spawnEvolutionPulse(scene, view) {
            if (!scene || !view || !view.container.visible) {
                return;
            }

            const auraColor = view.auraColor || 0x60a5fa;
            const centerX = view.container.x;
            const centerY = view.container.y - Math.round(view.sprite.displayHeight * 0.56);
            const pulse = scene.add.circle(centerX, centerY, 26, auraColor, 0.24).setDepth(24);
            pulse.setStrokeStyle(3, auraColor, 0.9);

            scene.tweens.add({
                targets: pulse,
                scaleX: 2.9,
                scaleY: 2.9,
                alpha: 0,
                duration: 360,
                ease: "Cubic.easeOut",
                onComplete: () => {
                    pulse.destroy();
                }
            });

            for (let i = 0; i < 8; i += 1) {
                const angle = (Math.PI * 2 * i) / 8;
                const spark = scene.add.circle(centerX, centerY, 3, auraColor, 0.92).setDepth(25);
                const distance = 60 + Math.random() * 20;
                const targetX = centerX + Math.cos(angle) * distance;
                const targetY = centerY + Math.sin(angle) * distance;

                scene.tweens.add({
                    targets: spark,
                    x: targetX,
                    y: targetY,
                    alpha: 0,
                    scaleX: 0.35,
                    scaleY: 0.35,
                    duration: 260,
                    ease: "Quad.easeOut",
                    onComplete: () => {
                        spark.destroy();
                    }
                });
            }
        }

        function spawnSlashTrail(scene, attackerView, isSword, animIndex) {
            if (!scene || !attackerView || !attackerView.container.visible) {
                return;
            }

            const color = isSword ? (attackerView.auraColor || 0x93c5fd) : 0xfcd34d;
            const trailWidth = isSword ? 130 : 98;
            const trailHeight = isSword ? 16 : 12;
            const offsetX = attackerView.dashDirection * (isSword ? 68 : 54);
            const offsetY = -Math.round(attackerView.sprite.displayHeight * 0.58) + (animIndex % 2 === 0 ? 0 : 8);

            const slash = scene.add.rectangle(
                attackerView.container.x + offsetX,
                attackerView.container.y + offsetY,
                trailWidth,
                trailHeight,
                color,
                0.88
            ).setDepth(27);

            slash.setAngle(attackerView.dashDirection * (isSword ? 19 : 12));

            scene.tweens.add({
                targets: slash,
                x: slash.x + attackerView.dashDirection * (isSword ? 28 : 20),
                alpha: 0,
                scaleX: 1.6,
                scaleY: 0.45,
                duration: 125,
                ease: "Cubic.easeOut",
                onComplete: () => {
                    slash.destroy();
                }
            });
        }

        function spawnRunAttackTrail(scene, attackerView) {
            if (!scene || !attackerView || !attackerView.container.visible) {
                return;
            }

            const auraColor = attackerView.auraColor || 0x60a5fa;
            const baseY = attackerView.container.y - Math.round(attackerView.sprite.displayHeight * 0.5);
            for (let i = 0; i < 3; i += 1) {
                scene.time.delayedCall(i * 40, () => {
                    if (!attackerView.container.visible) {
                        return;
                    }

                    const glow = scene.add.rectangle(
                        attackerView.container.x - attackerView.dashDirection * (18 + i * 6),
                        baseY + (i - 1) * 6,
                        88 - i * 16,
                        18 - i * 3,
                        auraColor,
                        0.42
                    ).setDepth(26);

                    scene.tweens.add({
                        targets: glow,
                        x: glow.x - attackerView.dashDirection * 22,
                        alpha: 0,
                        duration: 150,
                        ease: "Quad.easeOut",
                        onComplete: () => {
                            glow.destroy();
                        }
                    });
                });
            }
        }

        function spawnImpactBurst(scene, targetView, direction, isSword, impactIndex) {
            if (!scene || !targetView || !targetView.container.visible) {
                return;
            }

            const hitOffset = Math.max(0, Number(impactIndex) || 0);
            const impactX = targetView.container.x + direction * (18 + (hitOffset * 8));
            const impactY = targetView.container.y - Math.round(targetView.sprite.displayHeight * (0.56 + (hitOffset * 0.02)));
            const flashColor = isSword ? 0xbfdbfe : 0xfef3c7;
            const sparkColor = isSword ? 0x93c5fd : 0xfbbf24;

            const flashRadius = (isSword ? 26 : 21) + (hitOffset * 2.5);
            const flash = scene.add.circle(impactX, impactY, flashRadius, flashColor, 0.78).setDepth(30);
            scene.tweens.add({
                targets: flash,
                scaleX: 1.65,
                scaleY: 1.65,
                alpha: 0,
                duration: 160,
                ease: "Cubic.easeOut",
                onComplete: () => {
                    flash.destroy();
                }
            });

            for (let i = 0; i < 8; i += 1) {
                const spark = scene.add.circle(impactX, impactY, 2 + Math.random() * 1.4, sparkColor, 0.95).setDepth(31);
                const dir = Math.random() < 0.75 ? direction : -direction;
                const velocityX = dir * (46 + Math.random() * 86 + (hitOffset * 9));
                const velocityY = -30 - Math.random() * 86 - (hitOffset * 5);

                scene.tweens.add({
                    targets: spark,
                    x: impactX + velocityX,
                    y: impactY + velocityY,
                    alpha: 0,
                    scaleX: 0.45,
                    scaleY: 0.45,
                    duration: 230 + Math.random() * 80,
                    ease: "Quad.easeOut",
                    onComplete: () => {
                        spark.destroy();
                    }
                });
            }
        }

        function spawnDamageText(scene, targetView, damage, hitIndex) {
            if (!damage) {
                return;
            }

            const hitOffset = Math.max(0, Number(hitIndex) || 0);
            const text = scene.add.text(
                targetView.container.x,
                targetView.container.y - Math.round(targetView.sprite.displayHeight) - 96 - (hitOffset * 14),
                "-" + damage,
                {
                    fontFamily: "Segoe UI",
                    fontSize: "42px",
                    fontStyle: "900",
                    color: "#ef4444"
                }
            ).setOrigin(0.5).setDepth(30);

            text.setStroke("#7f1d1d", 6);

            scene.tweens.add({
                targets: text,
                y: text.y - 55,
                alpha: 0,
                duration: 460,
                ease: "Cubic.easeOut",
                onComplete: () => {
                    text.destroy();
                }
            });
        }

        function updateHud(arena) {
            const championText = arena.champion
                ? arena.champion.username + " (HP " + arena.champion.hp + ")"
                : "-";
            const challengerText = arena.challenger
                ? arena.challenger.username + " (HP " + arena.challenger.hp + ")"
                : "-";

            const nextTurn = arena.turn === "champion" ? "Champion" : "Challenger";
            const queueLimit = arena.settings?.maxQueue ?? 10;
            const activeFighters = (arena.champion ? 1 : 0) + (arena.challenger ? 1 : 0);

            ui.battleStatus.textContent =
                "Champion: " + championText + "\n" +
                "Challenger: " + challengerText + "\n" +
                "Giliran berikutnya: " + nextTurn;

            ui.queueMeta.textContent =
                "Fighter aktif: " + activeFighters +
                " | Queue " + (arena.queue?.length || 0) + "/" + queueLimit +
                " | Reserve: " + (arena.reserveCount || 0);

            ui.queueList.innerHTML = "";

            const queueItems = arena.queue || [];
            if (queueItems.length === 0) {
                const li = document.createElement("li");
                li.textContent = activeFighters >= 2
                    ? "Queue kosong (2 pemain pertama langsung bertarung)"
                    : "Queue kosong";
                ui.queueList.appendChild(li);
                return;
            }

            for (const player of queueItems) {
                const li = document.createElement("li");
                li.textContent = player.username + " (HP " + player.hp + ")";
                ui.queueList.appendChild(li);
            }
        }

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }
    </script>
</body>
</html>
